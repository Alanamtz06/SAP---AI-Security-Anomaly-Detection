applications:
  - name: api-gateway
    memory: 512M
    instances: 1
    timeout: 180
    buildpacks:
      - python_buildpack
    command: uvicorn app:app --host 0.0.0.0 --port $PORT
    health-check-type: http
    health-check-http-endpoint: /health
    env:
      HANA_HOST: bdad283d-c94e-46fb-8167-78fba6c2018a.hna1.prod-us10.hanacloud.ondemand.com
      HANA_PORT: "443"
      HANA_USER: DBADMIN
    services:
      - Hack_DB
