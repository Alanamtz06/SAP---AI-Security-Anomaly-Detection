_schema-version: "3.1"
ID: sap-soc-platform
version: 1.0.0
description: SAP SOC Hackathon - AI Security Anomaly Detection Platform

modules:
  - name: ml-engine
    type: python
    path: backend/services/ml-engine
    parameters:
      memory: 512M
      instances: 1
      timeout: 300
      command: uvicorn app:app --host 0.0.0.0 --port $PORT
    properties:
      POLL_INTERVAL_SECONDS: 120
    requires:
      - name: DB_Hack

  - name: soc-etl-pipeline
    type: python
    path: backend/services/etl-pipeline
    parameters:
      memory: 512M
      instances: 1
      timeout: 600
      command: python app.py --daemon
      no-route: true
      health-check-type: process
    properties:
      POLL_INTERVAL_SECONDS: 120
      ML_ENGINE_URL: ~{ml-engine/url}
    requires:
      - name: DB_Hack
      - name: ml-engine
        properties:
          ML_ENGINE_URL: ~{url}

  - name: alerting-service
    type: python
    path: backend/services/alerting-service
    parameters:
      memory: 256M
      instances: 1
      timeout: 300
      command: python app.py --daemon
      no-route: true
      health-check-type: process
    properties:
      ALERT_INTERVAL_SECONDS: 60
    requires:
      - name: DB_Hack

  - name: api-gateway
    type: python
    path: backend/services/api-gateway
    parameters:
      memory: 256M
      instances: 1
    requires:
      - name: DB_Hack

  - name: soc-frontend
    type: staticfile
    path: frontend
    parameters:
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
      build-result: dist
    properties:
      BACKEND_URL: ~{api-gateway/url}
    requires:
      - name: api-gateway
        properties:
          url: ~{api-gateway/url}

resources:
  - name: DB_Hack
    type: org.cloudfoundry.existing-service
